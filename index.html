<style>
/* ═══════════════ Design tokens ═══════════════ */
:root{
  --bg:#F4F8F5;
  --bg-grad-1:#E7F0EA;
  --bg-grad-2:#F4F8F5;
  --bg-grad-3:#FBFDFC;
  --surface:#FFFFFF;
  --surface-2:#F7FAF8;
  --hdr-1:#0F3D2A;
  --hdr-2:#1F6B4A;
  --hdr-3:#3EA06E;
  --accent:#2D8A5B;
  --text:#112A20;
  --text-2:#35524A;
  --mute:#6E867C;
  --light:#9AB0A4;
  --border:#E0EAE4;
  --border-strong:#C6D6CD;
  --tag-bg:#EEF5F0;
  --chip-bg:#F0F5F2;
  --danger:#B8462E;
  --shadow-sm:0 1px 2px rgba(15,61,42,.04), 0 1px 3px rgba(15,61,42,.06);
  --shadow-md:0 2px 6px rgba(15,61,42,.06), 0 8px 24px rgba(15,61,42,.08);
  --shadow-lg:0 6px 20px rgba(15,61,42,.10), 0 20px 48px rgba(15,61,42,.12);
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:14px;
  --radius-xl:20px;
  --serif:'Source Serif 4',Georgia,'Times New Roman',serif;
  --sans:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);
  --safe-r:env(safe-area-inset-right,0px);

  /* Category palette — carefully tuned, not auto-generated */
  --c-germains:#0A4A2A;
  --c-seed-tech:#1B6B4A;
  --c-market:#2E7D5B;
  --c-breeding:#4A9E72;
  --c-regulation:#5A8A7A;
  --c-competitors:#2B5C8A;
  --c-crops:#8A6B2E;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0A1A14;
    --bg-grad-1:#0A1A14;
    --bg-grad-2:#0E2219;
    --bg-grad-3:#132A20;
    --surface:#12251C;
    --surface-2:#0F1F18;
    --hdr-1:#07201A;
    --hdr-2:#0F3D2A;
    --hdr-3:#1F6B4A;
    --accent:#5ED69B;
    --text:#E8F2EC;
    --text-2:#B6C9BF;
    --mute:#89A197;
    --light:#607A70;
    --border:#1F3A2F;
    --border-strong:#2E5244;
    --tag-bg:#1A3528;
    --chip-bg:#162D22;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow-md:0 4px 12px rgba(0,0,0,.4);
    --shadow-lg:0 12px 36px rgba(0,0,0,.5);
  }
}

/* ═══════════════ Reset & base ═══════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  font-family:var(--sans);
  font-feature-settings:"ss01","cv11","tnum";
  color:var(--text);
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(62,160,110,.10), transparent 60%),
    linear-gradient(175deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 35%, var(--bg-grad-3) 100%);
  background-attachment:fixed;
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
button{font-family:inherit;color:inherit;-webkit-tap-highlight-color:transparent}
svg.icon{width:1em;height:1em;display:inline-block;vertical-align:-.125em;flex-shrink:0}
a{color:var(--accent);text-decoration:none}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}

/* ═══════════════ Header ═══════════════ */
.hdr{
  position:sticky;top:0;z-index:100;
  padding:calc(14px + var(--safe-t)) calc(16px + var(--safe-r)) 16px calc(16px + var(--safe-l));
  color:#fff;
  background:
    linear-gradient(180deg, rgba(15,61,42,0) 0%, rgba(15,61,42,.1) 100%),
    linear-gradient(135deg, var(--hdr-1) 0%, var(--hdr-2) 55%, var(--hdr-3) 120%);
  box-shadow:0 1px 0 rgba(0,0,0,.06), 0 6px 20px rgba(15,61,42,.18);
  -webkit-backdrop-filter:saturate(140%);backdrop-filter:saturate(140%);
}
.hdr::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(circle at 15% 20%, rgba(255,255,255,.10) 0%, transparent 40%),
    radial-gradient(circle at 85% 10%, rgba(255,255,255,.06) 0%, transparent 40%);
}
.hdr-inner{position:relative;max-width:760px;margin:0 auto}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.hdr-mark{
  width:30px;height:30px;border-radius:8px;
  background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.2);
  font-size:18px;color:#fff;
}
.hdr h1{font:900 24px/1.05 var(--serif);letter-spacing:-.5px;flex:1}
.hdr-badge{
  font:700 9.5px var(--sans);letter-spacing:1.4px;text-transform:uppercase;
  background:rgba(255,255,255,.14);
  color:rgba(255,255,255,.95);
  padding:4px 9px;border-radius:5px;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.1);
}
.hdr-sub{font:500 12px var(--sans);opacity:.75;margin-bottom:14px}

/* Tabs (regions) */
.tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:10px}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;display:inline-flex;align-items:center;gap:6px;
  padding:8px 13px;border-radius:9px;
  border:1.5px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.88);
  font:600 13px var(--sans);cursor:pointer;white-space:nowrap;
  transition:background .15s, border-color .15s, transform .08s;
}
.tab .icon{font-size:15px}
.tab:active{transform:scale(.97)}
.tab.on{border-color:rgba(255,255,255,.95);background:rgba(255,255,255,.22);color:#fff;font-weight:700;box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)}

/* Period pills */
.period-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:12px}
.period-row::-webkit-scrollbar{display:none}
.pill{
  flex-shrink:0;padding:6px 13px;border-radius:999px;
  border:1.5px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.05);color:rgba(255,255,255,.72);
  font:500 12px var(--sans);cursor:pointer;white-space:nowrap;
  transition:background .15s, color .15s, border-color .15s, transform .08s;
}
.pill:active{transform:scale(.96)}
.pill.on{border-color:#fff;background:rgba(255,255,255,.22);color:#fff;font-weight:700}

/* Search + email row */
.search-row{display:flex;gap:8px;flex-wrap:wrap}
.search-wrap{flex:1 1 200px;position:relative;display:flex;align-items:center}
.search-wrap .icon{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;color:rgba(255,255,255,.55);pointer-events:none;
}
.search{
  width:100%;padding:10px 14px 10px 36px;border-radius:10px;
  border:1.5px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.10);color:#fff;
  font:500 13px var(--sans);outline:none;
  transition:border-color .15s, background .15s;
}
.search::placeholder{color:rgba(255,255,255,.48)}
.search:focus{border-color:rgba(255,255,255,.6);background:rgba(255,255,255,.14)}
.btn-email{
  flex-shrink:0;display:inline-flex;align-items:center;gap:6px;
  padding:10px 14px;border-radius:10px;
  border:1.5px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);color:#fff;
  font:600 13px var(--sans);cursor:pointer;transition:background .15s;
}
.btn-email:hover{background:rgba(255,255,255,.16)}
.btn-email .icon{font-size:16px}

.email-panel{
  margin-top:12px;background:rgba(0,0,0,.2);border-radius:12px;padding:14px 16px;
  animation:fadeIn .2s ease-out;
}
.email-panel p{font:500 12px var(--sans);opacity:.85;margin-bottom:10px}
.email-btns{display:flex;gap:8px;flex-wrap:wrap}
.email-btns button{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font:600 13px var(--sans);cursor:pointer}
.btn-primary{border:none;background:#fff;color:var(--hdr-1)}
.btn-secondary{border:1.5px solid rgba(255,255,255,.3);background:transparent;color:#fff}

/* ═══════════════ Main layout ═══════════════ */
main{max-width:760px;margin:0 auto;padding:18px 16px calc(24px + var(--safe-b))}

/* Stats bar */
.stats{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:11px 16px;background:var(--surface);border-radius:var(--radius-md);
  margin-bottom:20px;box-shadow:var(--shadow-sm);
  font:500 12px var(--sans);color:var(--text-2);
  border:1px solid var(--border);
}
.stats b{color:var(--text);font-weight:700}
.stats .sep{color:var(--border-strong)}
.live-dot{display:inline-flex;align-items:center;gap:5px;margin-left:auto;font-size:11px;color:var(--mute)}
.live-dot::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.8s ease-in-out infinite}
.live-dot.done::before{background:var(--mute);animation:none}

/* Category section */
.cat-section{margin-bottom:22px}
.cat-btn{
  display:flex;align-items:center;gap:12px;width:100%;background:none;border:none;
  padding:10px 4px;text-align:left;cursor:pointer;border-radius:8px;
}
.cat-icon-wrap{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  background:color-mix(in srgb, var(--cat-c) 14%, transparent);
  color:var(--cat-c);
  box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--cat-c) 20%, transparent);
}
.cat-icon-wrap .icon{width:20px;height:20px}
.cat-label{flex:1;font:700 16.5px var(--serif);color:var(--text);letter-spacing:-.2px}
.cat-count{
  font:700 11px var(--sans);color:#fff;padding:3px 10px;border-radius:999px;
  background:var(--cat-c);letter-spacing:.2px;
}
.cat-pip{
  font:700 10px var(--sans);color:#fff;padding:2px 7px;border-radius:999px;
  background:#D9523A;letter-spacing:.3px;text-transform:uppercase;
  box-shadow:0 0 0 3px color-mix(in srgb, #D9523A 20%, transparent);
  animation:pip-pulse 2.4s ease-in-out infinite;
}
@keyframes pip-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* Germains priority score badges (card-level) */
.score-badge{
  font:700 10px var(--sans);padding:2px 7px;border-radius:4px;letter-spacing:.3px;
  text-transform:uppercase;
}
.score-badge.high{background:#0A4A2A;color:#C5F2D6}
.score-badge.med{background:#E8F5EC;color:#0A4A2A;box-shadow:inset 0 0 0 1px #BDDFC9}
.score-badge.low{background:var(--chip-bg);color:var(--mute)}
@media (prefers-color-scheme: dark){
  .score-badge.med{background:#163827;color:#A9E6BF;box-shadow:inset 0 0 0 1px #2A5240}
}

/* Notifications toggle (bell) */
.btn-bell{
  flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:10px;
  border:1.5px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);color:#fff;
  cursor:pointer;position:relative;
}
.btn-bell:hover{background:rgba(255,255,255,.16)}
.btn-bell .icon{font-size:17px}
.btn-bell.on{background:rgba(255,255,255,.22);border-color:#fff}
.btn-bell .badge{
  position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:#FF5A3C;
  box-shadow:0 0 0 2px var(--hdr-2);display:none;
}
.btn-bell.has-new .badge{display:block}
.cat-arrow{color:var(--mute);transition:transform .2s ease}
.cat-arrow.open{transform:rotate(180deg)}
.cat-cards{display:grid;gap:10px;margin:10px 0 6px 48px}
@media (max-width:480px){.cat-cards{margin-left:8px}}

/* Article card */
.card{
  position:relative;background:var(--surface);border-radius:var(--radius-md);
  padding:14px 16px 13px;box-shadow:var(--shadow-sm);
  border:1px solid var(--border);
  transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
}
.card::before{
  content:'';position:absolute;left:0;top:10px;bottom:10px;width:3px;
  background:var(--cat-c);border-radius:0 3px 3px 0;
}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.card h4{font:700 14.5px/1.4 var(--serif);color:var(--text);flex:1;letter-spacing:-.1px}
.card-link{
  display:inline-flex;align-items:center;gap:4px;
  font:600 10.5px var(--sans);letter-spacing:.4px;text-transform:uppercase;
  color:var(--cat-c);white-space:nowrap;flex-shrink:0;margin-top:2px;padding:2px 0;
}
.card-link .icon{font-size:11px}
.card p{margin-top:7px;font:400 13px/1.55 var(--sans);color:var(--text-2)}
.card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;align-items:center}
.tag{font:500 10.5px var(--sans);color:var(--mute);background:var(--tag-bg);padding:3px 8px;border-radius:5px}
.tag-date{display:inline-flex;align-items:center;gap:3px;font:400 10.5px var(--sans);color:var(--light)}
.tag-date .icon{font-size:11px}
.tag-region{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;color:var(--text-2);background:var(--chip-bg);padding:3px 7px;border-radius:4px}
.tag-region .icon{font-size:11px}
@media(hover:hover){
  .card:hover{transform:translateY(-1px);box-shadow:var(--shadow-md);border-color:var(--border-strong)}
}

/* ─── Competitor + angle chips (#4, #7) ─── */
.chip-comp, .chip-angle{
  display:inline-block;font:700 9.5px var(--sans);letter-spacing:.4px;text-transform:uppercase;
  padding:2px 7px;border-radius:4px;line-height:1.4;color:#fff;
}
.chip-angle{letter-spacing:.3px}
.chip-wl{display:inline-flex;align-items:center;gap:3px;font:700 10px var(--sans);letter-spacing:.3px;padding:3px 7px;border-radius:4px;background:#FFF2CC;color:#664400;border:1px solid #E5B94A}
.chip-wl::before{content:'●';font-size:8px;color:#D98B30}
@media(prefers-color-scheme:dark){
  .chip-wl{background:#3D3010;color:#F5CF6B;border-color:#7A5F1E}
}
.card-tags-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}

/* ─── Clickable tag filters: style chip-like <button>s identically to the spans
 *    they replace, but add cursor/hover/active feedback. Works in both the
 *    summary block and the card tag row. ─── */
button.chip-comp, button.chip-angle, button.chip-wl{
  border:0;font-family:var(--sans);cursor:pointer;
  transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease, filter .12s ease;
}
button.chip-wl{border:1px solid #E5B94A}
@media(prefers-color-scheme:dark){ button.chip-wl{border-color:#7A5F1E} }
button.chip-comp:hover, button.chip-angle:hover{ filter:brightness(1.12); transform:translateY(-1px) }
button.chip-wl:hover{ filter:brightness(1.05); transform:translateY(-1px) }
button.chip-comp:focus-visible, button.chip-angle:focus-visible, button.chip-wl:focus-visible{
  outline:2px solid var(--accent); outline-offset:2px;
}
/* Active (currently filtering) state — ring + slight lift */
button.chip-comp.is-active, button.chip-angle.is-active, button.chip-wl.is-active{
  box-shadow:0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  transform:translateY(-1px);
}
/* Dim non-active chips of the same type when a filter is on */
.tags-dimmed button.chip-comp:not(.is-active),
.tags-dimmed button.chip-angle:not(.is-active),
.tags-dimmed button.chip-wl:not(.is-active){ opacity:.55 }

/* ─── Active-filter banner (shown above summary when a tag filter is on) ─── */
.tag-filter-bar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  margin:6px 0 12px;padding:9px 14px;
  background:linear-gradient(90deg, var(--accent-soft), transparent);
  border:1px solid var(--accent);border-radius:10px;
  font:600 12.5px var(--sans);color:var(--text);
}
.tag-filter-bar .tag-filter-label{color:var(--mute);font-weight:500;text-transform:uppercase;font-size:11px;letter-spacing:.5px}
.tag-filter-bar .tag-filter-value{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:6px;background:var(--accent);color:#fff}
.tag-filter-bar .tag-filter-clear{
  margin-left:auto;background:none;border:1px solid var(--border-strong);color:var(--text);
  font:600 11.5px var(--sans);padding:5px 11px;border-radius:6px;cursor:pointer;
  display:inline-flex;align-items:center;gap:4px;
}
.tag-filter-bar .tag-filter-clear:hover{background:var(--chip-bg)}

/* ─── Star / shortlist (#1) ─── */
.card-top{display:flex;gap:8px;align-items:flex-start}
.star-btn{
  flex-shrink:0;background:none;border:0;cursor:pointer;padding:2px 4px;margin:-2px -4px -2px 0;
  color:var(--mute);transition:color .15s ease,transform .15s ease;line-height:0;
}
.star-btn:hover{color:#E5B94A;transform:scale(1.08)}
.star-btn.on{color:#E5B94A}
.star-btn .icon{font-size:17px}

/* ─── Trend delta arrow (#8) ─── */
.cat-trend{display:inline-flex;align-items:center;gap:3px;font:700 10.5px var(--sans);padding:2px 7px;border-radius:4px;margin-left:6px;letter-spacing:.3px}
.cat-trend.up{background:#DCF4E3;color:#0A4A2A}
.cat-trend.down{background:#F4E3DC;color:#8A2E1E}
@media(prefers-color-scheme:dark){
  .cat-trend.up{background:#163827;color:#A9E6BF}
  .cat-trend.down{background:#3D1F16;color:#E6A99F}
}

/* ─── Smart summary block (#2) ─── */
.summary-block{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);
  padding:16px 18px;margin:0 0 18px 0;box-shadow:var(--shadow-sm);
  border-left:4px solid var(--accent);
}
.summary-title{font:700 11.5px var(--sans);letter-spacing:.5px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.summary-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;align-items:center}
.summary-row:last-child{margin-bottom:0}
.summary-label{font:600 11.5px var(--sans);color:var(--mute);min-width:88px}
.summary-value{font:500 13px var(--sans);color:var(--text)}
.summary-value b{color:var(--accent);font-weight:700}
.summary-chips{display:inline-flex;gap:5px;flex-wrap:wrap}
.summary-btn-ai{
  display:inline-flex;align-items:center;gap:5px;font:700 11px var(--sans);
  padding:6px 12px;border-radius:6px;border:1px solid var(--border-strong);
  background:var(--surface);color:var(--text);cursor:pointer;margin-top:10px;
  transition:all .15s ease;
}
.summary-btn-ai:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.summary-btn-ai:disabled{opacity:.5;cursor:wait}
.ai-output{margin-top:12px;padding:14px 16px;background:var(--chip-bg);border-radius:8px;font:400 13px/1.6 var(--sans);color:var(--text);white-space:pre-wrap;display:none}
.ai-output.show{display:block}

/* ─── Watchlist panel (#13) ─── */
.wl-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;margin:10px 0;box-shadow:var(--shadow-sm)}
.wl-title{font:700 11.5px var(--sans);letter-spacing:.5px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.wl-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.wl-tag{display:inline-flex;align-items:center;gap:4px;font:600 11px var(--sans);padding:4px 8px;border-radius:5px;background:#FFF2CC;color:#664400;border:1px solid #E5B94A}
.wl-tag button{background:none;border:0;color:#664400;cursor:pointer;padding:0;font-size:14px;line-height:1;opacity:.6}
.wl-tag button:hover{opacity:1}
@media(prefers-color-scheme:dark){
  .wl-tag{background:#3D3010;color:#F5CF6B;border-color:#7A5F1E}
  .wl-tag button{color:#F5CF6B}
}
.wl-form{display:flex;gap:6px}
.wl-form input{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font:500 12.5px var(--sans)}
.wl-form button{padding:7px 14px;border:0;border-radius:6px;background:var(--accent);color:#fff;font:700 12px var(--sans);cursor:pointer}
.wl-empty{font:500 11.5px var(--sans);color:var(--mute);margin-bottom:8px}

/* ─── Shortlist tab + highlight ─── */
.card.in-shortlist{box-shadow:0 0 0 2px #E5B94A33 inset, var(--shadow-sm)}
.shortlist-empty{padding:40px 20px;text-align:center;color:var(--mute)}
.shortlist-empty .icon{font-size:32px;margin-bottom:12px;display:block}

/* Skeleton */
.skeleton-card{
  background:var(--surface);border-radius:var(--radius-md);padding:14px 16px;
  border:1px solid var(--border);box-shadow:var(--shadow-sm);
  position:relative;overflow:hidden;
}
.skeleton-card::before{
  content:'';position:absolute;left:0;top:10px;bottom:10px;width:3px;background:var(--border-strong);border-radius:0 3px 3px 0;
}
.skeleton-line{
  height:10px;background:linear-gradient(90deg, var(--border) 0%, var(--border-strong) 50%, var(--border) 100%);
  background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:4px;margin-bottom:8px;
}
.skeleton-line.w80{width:80%;height:14px}
.skeleton-line.w60{width:60%}
.skeleton-line.w90{width:90%}
.skeleton-line.last{width:40%;height:9px;margin-top:12px}

/* Loading spinner (filter change) */
.content-spinner{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;gap:14px}
.content-spinner .ring{
  width:42px;height:42px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;
}
.content-spinner p{font:500 13px var(--sans);color:var(--mute)}

/* Empty state */
.empty{text-align:center;padding:48px 20px;color:var(--mute)}
.empty-icon{
  width:64px;height:64px;margin:0 auto 14px;border-radius:16px;
  background:var(--chip-bg);display:flex;align-items:center;justify-content:center;color:var(--light);
}
.empty-icon .icon{font-size:28px}
.empty h3{font:700 16px var(--serif);color:var(--text);margin-bottom:6px}
.empty p{font:400 13.5px/1.5 var(--sans);color:var(--mute);max-width:280px;margin:0 auto 16px}
.empty button{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 18px;border-radius:8px;border:none;
  background:var(--accent);color:#fff;font:600 13px var(--sans);cursor:pointer;
}

/* Install banner */
.install-banner{
  max-width:760px;margin:0 auto 16px;background:var(--surface);border-radius:var(--radius-lg);
  padding:14px 16px;box-shadow:var(--shadow-sm);border:1px solid var(--border);
  display:flex;align-items:flex-start;gap:12px;
}
.install-banner .install-icon{
  width:36px;height:36px;border-radius:10px;background:var(--chip-bg);
  display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0;
}
.install-banner .install-icon .icon{font-size:18px}
.install-banner .install-text{flex:1;font:500 13px/1.5 var(--sans);color:var(--text-2)}
.install-banner .install-text b{color:var(--text);display:block;margin-bottom:3px;font-weight:700}
.install-banner .close{
  flex-shrink:0;background:none;border:none;color:var(--mute);cursor:pointer;padding:2px;
  border-radius:6px;display:flex;align-items:center;justify-content:center;
}
.install-banner .close .icon{font-size:16px}
.install-banner .close:hover{background:var(--chip-bg);color:var(--text)}
.install-steps{margin-top:6px;font-size:12px;color:var(--mute);list-style:none;display:flex;flex-direction:column;gap:3px}
.install-steps li{display:flex;gap:6px;align-items:baseline}
.install-steps li::before{content:"→";color:var(--accent);font-weight:700}
.btn-install{
  display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:8px 16px;border-radius:8px;
  background:var(--accent);color:#fff;font:600 12px var(--sans);border:none;cursor:pointer;
}

/* Footer */
footer{
  text-align:center;padding:20px 20px calc(20px + var(--safe-b));
  font:400 11px/1.6 var(--sans);color:var(--light);border-top:1px solid var(--border);
  max-width:760px;margin:12px auto 0;
}

/* Scroll-to-top */
.scroll-top{
  position:fixed;right:calc(16px + var(--safe-r));bottom:calc(16px + var(--safe-b));
  width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
  background:var(--accent);color:#fff;box-shadow:var(--shadow-md);
  display:flex;align-items:center;justify-content:center;z-index:50;
  opacity:0;transform:translateY(8px);pointer-events:none;transition:all .2s ease;
}
.scroll-top.show{opacity:1;transform:translateY(0);pointer-events:auto}
.scroll-top .icon{font-size:20px;transform:rotate(180deg)}

/* ═══════════════ Animations ═══════════════ */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.6}}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>

<header class="hdr" role="banner">
  <div class="hdr-inner">
    <div class="hdr-top">
      <span class="hdr-mark" aria-hidden="true"><svg class="icon"><use href="#icon-logo"/></svg></span>
      <h1>SeedPulse</h1>
      <span class="hdr-badge">Daily Brief</span>
    </div>
    <div class="hdr-sub" id="hdrSub">Vegetable seed &amp; horticulture intelligence</div>
    <nav class="tabs" id="tabs" role="tablist" aria-label="Region filter"></nav>
    <div class="period-row" id="periods" role="tablist" aria-label="Time period filter"></div>
    <div class="search-row">
      <div class="search-wrap">
        <svg class="icon" aria-hidden="true"><use href="#icon-search"/></svg>
        <input class="search" id="search" type="search" placeholder="Filter by keyword (Incotec, tomato, Syngenta…)" autocomplete="off" aria-label="Search articles">
      </div>
      <button class="btn-bell" id="bellBtn" aria-label="Germains alerts" title="Alert me when new high-priority Germains articles arrive">
        <svg class="icon" aria-hidden="true"><use href="#icon-bell-off" id="bellIconUse"/></svg>
        <span class="badge" aria-hidden="true"></span>
      </button>
      <button class="btn-email" id="emailBtn" aria-expanded="false" aria-controls="emailPanel">
        <svg class="icon" aria-hidden="true"><use href="#icon-mail"/></svg> Email
      </button>
    </div>
    <div class="email-panel" id="emailPanel" style="display:none" role="region" aria-label="Email export">
      <p id="emailCount"></p>
      <div class="email-btns">
        <button class="btn-primary" id="mailtoBtn"><svg class="icon" aria-hidden="true"><use href="#icon-mail"/></svg> Open in Mail</button>
        <button class="btn-secondary" id="copyBtn"><svg class="icon" aria-hidden="true"><use href="#icon-copy"/></svg> <span>Copy Report</span></button>
      </div>
    </div>
  </div>
</header>

<main id="main" role="main">
  <div class="stats" id="stats" aria-live="polite"></div>
  <div id="installPrompt"></div>
  <div id="content"></div>
</main>

<button class="scroll-top" id="scrollTop" aria-label="Back to top"><svg class="icon"><use href="#icon-chevron"/></svg></button>

<footer>
  SeedPulse · Live sources: 46 RSS & Google News feeds (trade press, industry, LinkedIn articles, topic searches) ·
  Built for Germains seed-tech intelligence · Cached offline for on-the-go reading
</footer>

<script>
(function(){
'use strict';

/* ═══════════════════════ Constants ═══════════════════════ */
var CACHE_KEY='seedpulse_v7';
var CACHE_TTL_MS=2*60*60*1000; // 2 hours — reuse cached feed below this age
var SEEN_KEY='seedpulse_seen_v1';      // stored set of article IDs we've already notified about
var NOTIF_PREF_KEY='seedpulse_notify'; // 'on' | 'off' | undefined (never asked)
var SHORTLIST_KEY='seedpulse_shortlist_v1'; // user-starred article IDs
var WATCHLIST_KEY='seedpulse_watchlist_v1'; // user-defined alert keywords (array of strings)
var TREND_SNAPSHOT_KEY='seedpulse_trend_v1'; // last-week counts by category for delta arrow
var DIGEST_TO_KEY='seedpulse_digest_email'; // subscriber email for daily digest (UI only — actual subscription via worker)

/* ─── Competitors (auto-tag + summary) ─── */
var COMPETITORS=[
  {k:'incotec',      label:'Incotec',      color:'#D98B30'},
  {k:'croda',        label:'Croda',        color:'#8A6B2E'},
  {k:'syngenta',     label:'Syngenta',     color:'#2B5C8A'},
  {k:'bayer',        label:'Bayer',        color:'#1E6B88'},
  {k:'basf',         label:'BASF',         color:'#1E4D8A'},
  {k:'rijk zwaan',   label:'Rijk Zwaan',   color:'#6B4A8A'},
  {k:'enza zaden',   label:'Enza Zaden',   color:'#8A2E5A'},
  {k:'bejo',         label:'Bejo',         color:'#4A7A2E'},
  {k:'sakata',       label:'Sakata',       color:'#8A4A2E'},
  {k:'takii',        label:'Takii',        color:'#8A6B4A'},
  {k:'limagrain',    label:'Limagrain',    color:'#4A8A6B'},
  {k:'nunhems',      label:'Nunhems',      color:'#6B7A4A'},
  {k:'corteva',      label:'Corteva',      color:'#2E6B8A'},
  {k:'east-west',    label:'East-West',    color:'#8A2E2E'},
  {k:'vilmorin',     label:'Vilmorin',     color:'#6B2E8A'},
  {k:'hazera',       label:'Hazera',       color:'#8A6B2E'},
  {k:'advanta',      label:'Advanta',      color:'#2E8A6B'}
];

/* ─── Germains product angles (auto-tag) ─── */
// Each angle has a label + primary keywords. An article can match multiple.
var PRODUCT_ANGLES=[
  {id:'priming',  label:'Priming',   color:'#0A4A2A',
   kw:['priming','osmopriming','hydropriming','hydro priming','osmo priming','drum priming','matrix priming','solid matrix priming','biopriming','pre-germination','osmotic conditioning']},
  {id:'coating',  label:'Coating',   color:'#1B6B4A',
   kw:['pelleting','pellet','film coat','filmcoat','film-coat','film coating','encrust','encrustment','seed coating','seed dressing','seed applied','coated seed','microplastic','polymer coating']},
  {id:'hygiene',  label:'Hygiene',   color:'#2E7D5B',
   kw:['seed hygiene','seed sanitation','seed health','thermotherapy','hot-water','hot water treatment','peroxide','steam treatment','pathogen','sanitiz','disinfect','phytosanitary']},
  {id:'analytics',label:'Analytics', color:'#4A9E72',

/* activeTag: null or {type:'comp'|'angle'|'wl', value:string}
 * Set by clicking any chip in the summary or on a card. Cleared via the
 * banner's "Clear" button or by clicking the active chip again. */
var activeTag=null;
function setTagFilter(type, value){
  if(activeTag && activeTag.type===type && activeTag.value===value){
    activeTag=null;     // click on the active chip → toggle off
  } else {
    activeTag={type:type, value:value};
  }
  render();
  // Scroll to top so the user sees the new filtered context.
  try{ window.scrollTo({top:0,behavior:'smooth'}); }catch(_){}
}
function clearTagFilter(){ activeTag=null; render(); }
function matchesActiveTag(a){
  if(!activeTag) return true;
  if(activeTag.type==='comp')  return (a.comp||[]).indexOf(activeTag.value)>=0;
  if(activeTag.type==='angle') return (a.ang ||[]).indexOf(activeTag.value)>=0;
  if(activeTag.type==='wl'){
    var txt=(a.t+' '+a.s).toLowerCase();
    return txt.indexOf(activeTag.value.toLowerCase())>=0;
  }
  return true;
}

/* ═══════════════════════ Helpers ═══════════════════════ */
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];});}
function stripHtml(h){return h.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();}
function parseIso(s){try{var d=new Date(s);return isNaN(d)?new Date():d;}catch(e){return new Date();}}
function parseLocalDate(isoStr){
  if(!isoStr) return new Date();
  var parts=String(isoStr).split('-');
  if(parts.length===3) return new Date(+parts[0], +parts[1]-1, +parts[2]);
  var d=new Date(isoStr); return isNaN(d)?new Date():d;
}
function daysAgo(n){var d=new Date(TODAY);d.setDate(d.getDate()-n);d.setHours(0,0,0,0);return d;}
function debounce(fn,ms){var t;return function(){var a=arguments,c=this;clearTimeout(t);t=setTimeout(function(){fn.apply(c,a);},ms);};}

function categorize(title,desc){
  var txt=(title+' '+desc).toLowerCase();
  var primary=['seed_tech','market','breeding','regulation','competitors','crops'];
  var best='crops',bestScore=0;
  primary.forEach(function(cat){
    var score=CAT_KW[cat].filter(function(k){return txt.indexOf(k)>=0;}).length;
    if(score>bestScore){bestScore=score;best=cat;}
  });
  return best;
}
// Legacy boolean — still used by the render filter fallback
function isGermains(title,desc){
  return germainsScore(title,desc)>0;
}
// Weighted relevance score. Core Germains tech / brand mentions count 3×.
// Secondary matches (crop names like "onion seed") count 1×.
// Higher = more directly relevant to Germains' commercial technologies.
function germainsScore(title,desc){
  var txt=(title+' '+desc).toLowerCase();
  var score=0;
  CAT_KW.germains.forEach(function(k){
    if(txt.indexOf(k)>=0){
      score += GERMAINS_CORE.indexOf(k)>=0 ? 3 : 1;
    }
  });
  return score;
}
function regionalize(title,desc){
  var txt=(title+' '+desc).toLowerCase();
  var regs=['all'];
  Object.keys(REG_KW).forEach(function(reg){
    if(REG_KW[reg].some(function(k){return txt.indexOf(k)>=0;})) regs.push(reg);
  });
  return regs;
}
function articleId(title,link){
  // Stable fingerprint — link if present, else a slug of the title
  var base=(link||title||'').toLowerCase().replace(/[^a-z0-9]+/g,'').substring(0,64);
  return base || String(Date.now());
}

// Detect competitors mentioned in title+desc. Returns array of labels.
function detectCompetitors(title,desc){
  var txt=(title+' '+desc).toLowerCase();
  return COMPETITORS.filter(function(c){return txt.indexOf(c.k)>=0;})
                    .map(function(c){return c.label;});
}
// Detect Germains product angles (priming / coating / hygiene / analytics)
function detectAngles(title,desc){
  var txt=(title+' '+desc).toLowerCase();
  return PRODUCT_ANGLES.filter(function(a){
    return a.kw.some(function(k){return txt.indexOf(k)>=0;});
  }).map(function(a){return a.id;});
}
// Detect watchlist keyword hits (user-defined). Returns matching terms.
function detectWatchlist(title,desc){
  var list=loadWatchlist();
  if(!list.length) return [];
  var txt=(title+' '+desc).toLowerCase();
  return list.filter(function(kw){return kw && txt.indexOf(kw.toLowerCase())>=0;});
}

function normalizeItem(item,srcName){
  var title=(item.title||'').trim();
  var desc=stripHtml(item.content||item.description||'').substring(0,280);
  if(desc.length===280) desc+='…';
  var pubDate=parseIso(item.pubDate||item.published||'');
  var link=item.link||item.url||'';
  var gs=germainsScore(title,desc);
  return {
    id:articleId(title,link),
    c:categorize(title,desc), g:gs>0, gs:gs, r:regionalize(title,desc),
    t:title, s:desc, src:srcName, u:link,
    d:pubDate.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),
    iso:pubDate.toISOString().split('T')[0],
    comp:detectCompetitors(title,desc),   // ← #4 competitor tags
    ang: detectAngles(title,desc)         // ← #7 product angles
    // wl:   filled lazily on render (depends on user's watchlist which can change)
  };
}

// #8 Trend snapshots — compare current counts to previous snapshot
// Snapshot is rotated weekly so we always compare "this week" vs "last week"
function loadTrendSnapshot(){
  try{ return JSON.parse(localStorage.getItem(TREND_SNAPSHOT_KEY)||'null'); }
  catch(e){ return null; }
}
function maybeUpdateTrendSnapshot(catCounts){
  var prev=loadTrendSnapshot();
  var now=Date.now();
  var WEEK=7*24*60*60*1000;
  if(!prev || (now - prev.ts) > WEEK){
    try{ localStorage.setItem(TREND_SNAPSHOT_KEY, JSON.stringify({ts:now, counts:catCounts})); }catch(e){}
  }
}
function trendDelta(catId, currentCount){
  var prev=loadTrendSnapshot();
  if(!prev || !prev.counts || prev.counts[catId]==null || prev.counts[catId]===0) return null;
  var prevC=prev.counts[catId];
  var delta=currentCount - prevC;
  var pct=Math.round((delta/prevC)*100);
  if(Math.abs(pct)<10) return null; // hide noise
  return { pct:pct, dir: pct>0?'up':'down' };
}

/* ═══════════════════════ Feed fetching ═══════════════════════ */
function fetchFeed(feed){
  // Use self-hosted proxy if configured; otherwise rss2json free tier.
  var base = PROXY_URL ? PROXY_URL : RSS2JSON;
  return fetch(base+encodeURIComponent(feed.url),{cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.status!=='ok'||!Array.isArray(data.items)) return [];
      return data.items.map(function(it){return normalizeItem(it,feed.src);});
    }).catch(function(){return []; });
}
function fetchFeedWithTimeout(feed){
  var timeout=new Promise(function(resolve){setTimeout(function(){resolve([]);},8000);});
  return Promise.race([fetchFeed(feed),timeout]);
}
function batchedFetch(feeds,size){
  var results=[];
  function next(i){
    if(i>=feeds.length) return Promise.resolve(results);
    var batch=feeds.slice(i,i+size);
    return Promise.all(batch.map(fetchFeedWithTimeout)).then(function(br){
      br.forEach(function(r){results=results.concat(r);});
      return next(i+size);
    });
  }
  return next(0);
}
function dedupe(arr){
  var seen={};
  return arr.filter(function(a){
    var key=a.t.toLowerCase().replace(/\s+/g,'').substring(0,50);
    if(seen[key]) return false;
    seen[key]=true; return true;
  });
}

/* ═══════════════════════ Seen-set + notifications ═══════════════════════ */
function loadSeen(){
  try{var s=localStorage.getItem(SEEN_KEY);return s?JSON.parse(s):{};}catch(e){return {};}
}
function saveSeen(seen){
  // Cap stored IDs at 2000 to keep localStorage reasonable
  var keys=Object.keys(seen);
  if(keys.length>2000){
    // Drop the oldest half by insertion order
    var half=keys.slice(0,keys.length-2000);
    half.forEach(function(k){delete seen[k];});
  }
  try{localStorage.setItem(SEEN_KEY,JSON.stringify(seen));}catch(e){}
}

}
function setNotifyPref(v){

}

/* Fire local notifications for new high-priority Germains articles.
   Pure client-side: runs whenever the app is opened. When the PWA is
   installed to the home screen and the service worker has permission,
   notifications appear even when the app tab isn't in the foreground.
   For server-driven push (alerts without user opening the app), a
   lightweight backend + VAPID keys would be required — follow-up. */
function checkAndNotify(){
  if(getNotifyPref()!=='on') return;
  if(!('Notification' in window) || Notification.permission!=='granted') return;

  var seen=loadSeen();
  var candidates=A
    .filter(function(a){return a.gs>=GERMAINS_NOTIFY_MIN && !seen[a.id];})
    .sort(function(x,y){return y.gs-x.gs;})
    .slice(0,3); // never fire more than 3 at once — don't spam

  if(!candidates.length) return;

  var useSw=('serviceWorker' in navigator) && navigator.serviceWorker.ready;
  var fire=function(reg){
    candidates.forEach(function(a){
      var opts={
        body:a.s.substring(0,140),
        icon:'icon-192.svg',
        badge:'icon-192.svg',
        tag:'seedpulse-'+a.id, // dedupe re-notifications for same article
        data:{url:a.u||location.href},
        renotify:false
      };
      try{
        if(reg && reg.showNotification){ reg.showNotification('SeedPulse: '+a.t, opts); }
        else { new Notification('SeedPulse: '+a.t, opts); }
      }catch(e){}
      seen[a.id]=Date.now();
    });
    saveSeen(seen);
  };
  if(useSw){ navigator.serviceWorker.ready.then(fire).catch(function(){fire(null);}); }
  else { fire(null); }
}

/* Mark every currently-seen Germains article as seen WITHOUT notifying —
   used on first-time enable so we don't blast the user with a backlog. */
function primeSeen(){
  var seen=loadSeen();
  A.forEach(function(a){ if(a.gs>=GERMAINS_NOTIFY_MIN) seen[a.id]=Date.now(); });
  saveSeen(seen);
}

function updateBellUI(){
  var btn=document.getElementById('bellBtn');
  if(!btn) return;
  var iconUse=document.getElementById('bellIconUse');
  var pref=getNotifyPref();
  var granted=('Notification' in window) && Notification.permission==='granted';
  var on=pref==='on' && granted;
  btn.classList.toggle('on',on);
  if(iconUse) iconUse.setAttribute('href', on ? '#icon-bell' : '#icon-bell-off');
  // Badge shows unseen high-priority count
  var seen=loadSeen();
  var unseenHigh=A.filter(function(a){return a.gs>=GERMAINS_NOTIFY_MIN && !seen[a.id];}).length;
  btn.classList.toggle('has-new', on && unseenHigh>0);
  btn.title=on
    ? (unseenHigh>0 ? unseenHigh+' new high-priority Germains items' : 'Germains alerts on')
    : 'Enable alerts for new high-priority Germains articles';
}

/* ═══════════ Server push (optional) ═══════════
   Subscribes the browser to the Push API and registers the subscription
   with the SeedPulse Push Worker. When PUSH_WORKER_URL is blank, we fall
   back to client-only notifications (fire on app launch only). */

function urlBase64ToUint8Array(b64){
  var pad='='.repeat((4-b64.length%4)%4);
  var s=(b64+pad).replace(/-/g,'+').replace(/_/g,'/');
  var raw=atob(s); var out=new Uint8Array(raw.length);
  for(var i=0;i<raw.length;i++) out[i]=raw.charCodeAt(i);
  return out;
}

async function subscribeToPush(){
  if(!PUSH_WORKER_URL) return { mode: 'local' };
  if(!('serviceWorker' in navigator) || !('PushManager' in window)){
    return { mode: 'local', reason: 'no push support' };
  }
  var reg = await navigator.serviceWorker.ready;

  // Tell the SW what the push worker URL is so its push handler can fetch /latest
  try{ reg.active && reg.active.postMessage({ type:'SET_PUSH_URL', url: PUSH_WORKER_URL }); }catch(e){}

  // Fetch the server's VAPID public key
  var keyRes = await fetch(PUSH_WORKER_URL.replace(/\/$/,'')+'/vapid-key',{cache:'no-store'});
  if(!keyRes.ok) throw new Error('VAPID key fetch failed');
  var publicKey = (await keyRes.json()).publicKey;

  // Reuse existing subscription if possible (avoids duplicate server rows)
  var existing = await reg.pushManager.getSubscription();
  var sub = existing || await reg.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: urlBase64ToUint8Array(publicKey)
  });

  // Register with the push worker
  var postRes = await fetch(PUSH_WORKER_URL.replace(/\/$/,'')+'/subscribe',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ subscription: sub.toJSON() })
  });
  if(!postRes.ok) throw new Error('subscribe failed ('+postRes.status+')');

  return { mode: 'server', subscription: sub };
}

async function unsubscribeFromPush(){
  if(!PUSH_WORKER_URL) return;
  if(!('serviceWorker' in navigator)) return;
  var reg = await navigator.serviceWorker.ready;
  var sub = await reg.pushManager.getSubscription();
  if(!sub) return;
  try{
    await fetch(PUSH_WORKER_URL.replace(/\/$/,'')+'/unsubscribe',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ endpoint: sub.endpoint })
    });
  }catch(e){}
  try{ await sub.unsubscribe(); }catch(e){}
}

async function toggleNotifyPref(){
  var pref=getNotifyPref();
  if(pref==='on'){
    setNotifyPref('off');
    await unsubscribeFromPush();
    updateBellUI();
    return;
  }
  if(!('Notification' in window)){
    alert('Your browser does not support notifications.');
    return;
  }
  if(Notification.permission==='denied'){
    alert('Notifications are blocked. Enable them in your browser settings for this site, then tap the bell again.');
    return;
  }
  var perm = Notification.permission==='granted'
    ? 'granted'
    : await Notification.requestPermission();
  if(perm!=='granted'){ updateBellUI(); return; }

  // Subscribe to server push if a worker is configured; otherwise fall through
  // to client-only "check-on-launch" mode. Any error falls back to local mode.
  var mode='local';
  try{
    var r = await subscribeToPush();
    mode = r.mode;
  }catch(e){
    console.warn('Server push subscription failed, falling back to local:', e);
    mode='local';
  }

  setNotifyPref('on');
  // Prime the seen-set so the initial backlog of high-priority items doesn't
  // trigger a notification storm. From this point forward, only NEW ones fire.
  primeSeen();
  updateBellUI();

  // Welcome confirmation
  try{
    var reg = await navigator.serviceWorker.ready;
    reg.showNotification('SeedPulse alerts on', {
      body: mode==='server'
        ? 'You\'ll be notified when new high-priority Germains articles arrive, even when the app is closed.'
        : 'You\'ll be notified when new high-priority Germains articles are detected on next launch.',
      icon:'icon-192.svg', badge:'icon-192.svg', tag:'seedpulse-welcome'
    });
  }catch(e){}
}

/* ═══════════════════════ Filtering ═══════════════════════ */
function passesperiod(isoStr){
  if(period==="all") return true;
  var d=parseLocalDate(isoStr);
  if(period==="7d")  return d>=daysAgo(7);
  if(period==="30d") return d>=daysAgo(30);
  if(period==="3m")  return d>=daysAgo(90);
  if(period==="6m")  return d>=daysAgo(180);
  if(period==="2026") return d.getFullYear()===2026;
  if(period==="2025") return d.getFullYear()===2025;
  return true;
}
function getFiltered(){
  var s = region==='shortlist' ? loadShortlist() : null;
  return A.filter(function(a){
    if(region==='shortlist'){ if(!s[a.id]) return false; }
    else if(region!=='all' && a.r.indexOf(region)<0) return false;
    if(!passesperiod(a.iso)) return false;
    if(!matchesActiveTag(a)) return false;
    if(!filter) return true;
    var txt=(a.t+" "+a.s+" "+(a.src||"")).toLowerCase();
    return txt.indexOf(filter.toLowerCase())>=0;
  });
}

/* #2 Smart summary — "Why this matters to Germains" ─────────────────────────
   Scans the current filtered item set and produces a 3-line brief:
   high-priority count, top competitors, top Germains angles. */
function computeSummary(items){
  var s=loadShortlist();
  // High-priority Germains items (gs>=3)
  var highPri = items.filter(function(a){
    if(a.gs==null) a.gs=germainsScore(a.t,a.s);
    return a.gs >= GERMAINS_NOTIFY_MIN;
  });
  // Tally competitor mentions
  var compTally={};
  items.forEach(function(a){(a.comp||[]).forEach(function(c){compTally[c]=(compTally[c]||0)+1;});});
  var topComp=Object.keys(compTally).map(function(k){return {k:k,n:compTally[k]};})
    .sort(function(x,y){return y.n-x.n;}).slice(0,5);
  // Tally product angles
  var angTally={};
  items.forEach(function(a){(a.ang||[]).forEach(function(c){angTally[c]=(angTally[c]||0)+1;});});
  var topAng=Object.keys(angTally).map(function(k){return {k:k,n:angTally[k]};})
    .sort(function(x,y){return y.n-x.n;}).slice(0,4);
  // Watchlist hits
  var wlTally={};
  var wl=loadWatchlist();
  if(wl.length){
    items.forEach(function(a){
      wl.forEach(function(kw){
        var txt=(a.t+' '+a.s).toLowerCase();
        if(txt.indexOf(kw.toLowerCase())>=0) wlTally[kw]=(wlTally[kw]||0)+1;
      });
    });
  }
  var topWl=Object.keys(wlTally).map(function(k){return {k:k,n:wlTally[k]};})
    .sort(function(x,y){return y.n-x.n;}).slice(0,4);
  return {
    total:items.length,
    highPri:highPri.length,
    shortlistCount:Object.keys(s).length,
    topComp:topComp,
    topAng:topAng,
    topWl:topWl
  };
}

function renderSmartSummary(items, isShortlist){
  var s=computeSummary(items);
  var isActive=function(type,val){ return activeTag && activeTag.type===type && activeTag.value===val; };
  var compHtml = s.topComp.length
    ? s.topComp.map(function(c){
        var def=COMPETITORS.find(function(x){return x.label===c.k;});
        var col=def?def.color:'#6E867C';
        var on=isActive('comp',c.k);
        return '<button type="button" class="chip-comp'+(on?' is-active':'')+'" style="background:'+col+'" '+
               'data-tag-filter="comp" data-tag-value="'+esc(c.k)+'" '+
               'aria-pressed="'+on+'" title="'+(on?'Clear filter':'Filter by '+esc(c.k))+'">'+
               esc(c.k)+' ·'+c.n+'</button>';
      }).join('')
    : '<span style="color:var(--mute);font-size:12px">none detected</span>';
  var angHtml = s.topAng.length
    ? s.topAng.map(function(a){
        var def=PRODUCT_ANGLES.find(function(x){return x.id===a.k;});
        if(!def) return '';
        var on=isActive('angle',a.k);
        return '<button type="button" class="chip-angle'+(on?' is-active':'')+'" style="background:'+def.color+'" '+
               'data-tag-filter="angle" data-tag-value="'+esc(a.k)+'" '+
               'aria-pressed="'+on+'" title="'+(on?'Clear filter':'Filter by '+esc(def.label))+'">'+
               esc(def.label)+' ·'+a.n+'</button>';
      }).join('')
    : '<span style="color:var(--mute);font-size:12px">none detected</span>';
  var wlHtml = s.topWl.length
    ? s.topWl.map(function(w){
        var on=isActive('wl',w.k);
        return '<button type="button" class="chip-wl'+(on?' is-active':'')+'" '+
               'data-tag-filter="wl" data-tag-value="'+esc(w.k)+'" '+

function renderCatSection(cat,ci){
  var isOpen=expanded[cat.id];
  // Germains "new high-priority" pip — number of unseen gs>=3 items
  var pipHtml='';
  if(cat.id==='germains'){
    var seen=loadSeen();
    var newHigh=ci.filter(function(a){return a.gs>=GERMAINS_NOTIFY_MIN && !seen[a.id];}).length;
    if(newHigh>0) pipHtml='<span class="cat-pip" title="'+newHigh+' new high-priority">'+newHigh+' new</span>';
  }
  // #8 Trend delta vs last week
  var trendHtml='';
  var td=trendDelta(cat.id, ci.length);
  if(td){
    trendHtml='<span class="cat-trend '+td.dir+'" title="'+(td.dir==='up'?'+':'')+td.pct+'% vs last week">'+
      icon(td.dir==='up'?'icon-trending-up':'icon-trending-down')+
      (td.pct>0?'+':'')+td.pct+'%</span>';
  }
  var h='<section class="cat-section" style="--cat-c:var('+(cat.cvar||'--accent')+')">'+
    '<button class="cat-btn" data-cat="'+cat.id+'" aria-expanded="'+isOpen+'">'+
      '<span class="cat-icon-wrap">'+icon(cat.icon)+'</span>'+
      '<span class="cat-label">'+esc(cat.label)+'</span>'+
      trendHtml+
      pipHtml+
      '<span class="cat-count">'+ci.length+'</span>'+
      '<span class="cat-arrow '+(isOpen?'open':'')+'">'+icon('icon-chevron')+'</span>'+
    '</button>';
  if(isOpen){
    var shortlist=loadShortlist();
    h+='<div class="cat-cards">';
    ci.forEach(function(a){
      h+=renderCard(a,cat,shortlist);
    });
    h+='</div>';
  }
  h+='</section>';
  return h;
}

// Single card renderer — reused by category sections + shortlist view
function renderCard(a,cat,shortlist){
  shortlist = shortlist || loadShortlist();
  var starred = !!shortlist[a.id];
  var rtags=a.r.filter(function(r){return r!=="all"&&r!=="shortlist";}).map(function(rid){
    var rr=REGIONS.find(function(x){return x.id===rid;});
    return rr && rr.id!=='shortlist' ? '<span class="tag-region">'+icon(rr.icon)+' '+esc(rr.label)+'</span>' : '';
  }).join('');

  var scoreBadge='';
  if(cat && cat.id==='germains' && a.gs){
    var tier=a.gs>=6?'high':(a.gs>=3?'med':'low');
    var label=a.gs>=6?'High':(a.gs>=3?'Medium':'Low');
    scoreBadge='<span class="score-badge '+tier+'" title="Germains relevance score: '+a.gs+'">'+label+'</span>';
  }

  var isActive=function(type,val){ return activeTag && activeTag.type===type && activeTag.value===val; };

  // #4 Competitor chips (clickable filter) — cap at 3 to avoid visual noise
  var compChips = (a.comp||[]).slice(0,3).map(function(label){
    var c=COMPETITORS.find(function(x){return x.label===label;});
    var col=c?c.color:'#6E867C';
    var on=isActive('comp',label);
    return '<button type="button" class="chip-comp'+(on?' is-active':'')+'" style="background:'+col+'" '+
           'data-tag-filter="comp" data-tag-value="'+esc(label)+'" '+
           'aria-pressed="'+on+'" title="'+(on?'Clear filter':'Filter by '+esc(label))+'">'+esc(label)+'</button>';
  }).join('');

  // #7 Product-angle chips
  var angChips = (a.ang||[]).map(function(id){
    var ang=PRODUCT_ANGLES.find(function(x){return x.id===id;});
    if(!ang) return '';
    var on=isActive('angle',id);
    return '<button type="button" class="chip-angle'+(on?' is-active':'')+'" style="background:'+ang.color+'" '+
           'data-tag-filter="angle" data-tag-value="'+esc(id)+'" '+
           'aria-pressed="'+on+'" title="'+(on?'Clear filter':'Germains product angle: '+esc(ang.label))+'">'+esc(ang.label)+'</button>';
  }).join('');

  // #13 Watchlist chip — computed at render time (user can edit list anytime)
  var wlHits=detectWatchlist(a.t,a.s);
  var wlChips = wlHits.slice(0,2).map(function(kw){
    var on=isActive('wl',kw);
    return '<button type="button" class="chip-wl'+(on?' is-active':'')+'" '+
           'data-tag-filter="wl" data-tag-value="'+esc(kw)+'" '+
           'aria-pressed="'+on+'" title="'+(on?'Clear filter':'Watchlist: filter by "'+esc(kw)+'"')+'">'+esc(kw)+'</button>';
  }).join('');

  var dimClass = activeTag ? ' tags-dimmed' : '';
  var tagsRow = (compChips||angChips||wlChips)
    ? '<div class="card-tags-row'+dimClass+'">'+wlChips+compChips+angChips+'</div>'
    : '';

  return '<article class="card'+(starred?' in-shortlist':'')+'" data-aid="'+esc(a.id)+'">'+
           '<div class="card-top">'+
             '<h4>'+esc(a.t)+'</h4>'+
             '<button class="star-btn '+(starred?'on':'')+'" data-star="'+esc(a.id)+'" aria-pressed="'+starred+'" aria-label="'+(starred?'Remove from shortlist':'Add to shortlist')+'" title="'+(starred?'Remove from shortlist':'Add to shortlist')+'">'+
               icon(starred?'icon-star-fill':'icon-star')+
             '</button>'+
             (a.u?'<a class="card-link" href="'+esc(a.u)+'" target="_blank" rel="noopener">Source '+icon('icon-external')+'</a>':'')+
           '</div>'+
           (a.s?'<p>'+esc(a.s)+'</p>':'')+
           tagsRow+
           '<div class="card-meta">'+
             scoreBadge+
             (a.src?'<span class="tag">'+esc(a.src)+'</span>':'')+
             (a.d?'<span class="tag-date">'+icon('icon-calendar')+' '+esc(a.d)+'</span>':'')+
             rtags+
           '</div>'+
         '</article>';
}

/* Active tag-filter banner — shown above the summary/watchlist whenever
 * a chip has been clicked. Gives the user an obvious "you're now viewing a
 * subset" affordance plus a one-click Clear. */
function renderTagFilterBar(items){
  if(!activeTag) return '';
  var label='', swatchStyle='background:var(--accent)';
  if(activeTag.type==='comp'){
    var c=COMPETITORS.find(function(x){return x.label===activeTag.value;});
    label='Competitor: '+activeTag.value;
    if(c) swatchStyle='background:'+c.color;
  } else if(activeTag.type==='angle'){
    var ang=PRODUCT_ANGLES.find(function(x){return x.id===activeTag.value;});
    label='Germains angle: '+(ang?ang.label:activeTag.value);

    label='Watchlist: "'+activeTag.value+'"';

           '<span class="tag-filter-value" style="'+swatchStyle+'">'+esc(label)+'</span>'+
           '<span style="color:var(--mute);font-weight:500;font-size:11.5px;">'+items.length+' match'+(items.length===1?'':'es')+'</span>'+
           '<button type="button" class="tag-filter-clear" data-tag-clear="1" aria-label="Clear tag filter">'+
             icon('icon-close')+' Clear</button>'+
         '</div>';

function render(){
  var items=getFiltered();
  renderStats(items);

  // #1 Shortlist — flat view, no category grouping
  if(region==='shortlist'){
    var html=renderTagFilterBar(items);
    html+=renderSmartSummary(items,true);
    html+=renderWatchlistPanel();
    if(!items.length){
      html+='<div class="shortlist-empty">'+icon('icon-star')+
            '<h3>Your Shortlist is empty</h3>'+
            '<p>Tap the star on any article to save it here — build a weekly read-list and export just your curated picks.</p></div>';
    } else {
      var shortlist=loadShortlist();
      // Sort by date desc, then Germains score desc
      var sorted=items.slice().sort(function(x,y){
        var d=(y.iso||'').localeCompare(x.iso||'');
        if(d!==0) return d;
        return (y.gs||0)-(x.gs||0);
      });
      html+='<div class="cat-cards" style="margin-left:0">';
      sorted.forEach(function(a){ html+=renderCard(a,null,shortlist); });
      html+='</div>';
    }
    document.getElementById("content").innerHTML=html;
    return;
  }

  // #2 Smart summary block + #13 watchlist panel (preceded by the tag-filter banner)
  var html=renderTagFilterBar(items);
  html+=renderSmartSummary(items,false);
  html+=renderWatchlistPanel();

  // Collect per-category counts for #8 trend tracking
  var catCounts={};
  CATS.forEach(function(cat){
    var ci = cat.id==='germains'
      ? items.filter(function(a){
          // Ensure score exists on fallback items (which don't have it pre-computed)
          if(a.gs==null) a.gs=germainsScore(a.t,a.s);
          return a.gs>0;
        }).sort(function(x,y){
          // Highest relevance first; break ties by recency
          if(y.gs!==x.gs) return y.gs-x.gs;
          return (y.iso||'').localeCompare(x.iso||'');
        })
      : items.filter(function(a){return a.c===cat.id;});
    catCounts[cat.id]=ci.length;
    if(!ci.length) return;
    html+=renderCatSection(cat,ci);
  });
  // Persist a weekly snapshot so next week's render can show trend deltas
  maybeUpdateTrendSnapshot(catCounts);

  if(!items.length){
    var empty='<div class="empty"><div class="empty-icon">'+icon('icon-empty')+'</div>';
    if(A.length===0){
      empty+='<h3>Loading articles…</h3><p>Fetching the latest from 46 sources.</p>'+renderSkeletons();
    } else if(!liveLoaded){
      empty+='<h3>Still loading live feeds</h3><p>You\'re viewing the curated fallback set. Give it a moment and try again.</p>'+renderSkeletons();
    } else if(period!=='all'){
      var fromDate=period==='7d'?daysAgo(7):period==='30d'?daysAgo(30):period==='3m'?daysAgo(90):period==='6m'?daysAgo(180):null;
      var rangeLabel=fromDate?fromDate.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})+' – today':period;
      empty+='<h3>No articles in this window</h3>'+
             '<p>Nothing found between <b>'+esc(rangeLabel)+'</b>. Try a wider period or clear your filters.</p>'+
             '<button id="resetPeriod">Show all time</button>';
    } else {
      empty+='<h3>No matches</h3><p>No articles match your current filters. Try adjusting the region or search term.</p>';
    }
    empty+='</div>';
    html=empty;
  }

  document.getElementById("content").innerHTML=html;
}

    "Generated: "+new Date().toLocaleDateString("en-GB",{weekday:"long",year:"numeric",month:"long",day:"numeric"}),
    filter?"Filter: "+filter:"","","══════════════════════════════════════════════"
  ];
  CATS.forEach(function(cat){
    var ci = cat.id==='germains'
      ? items.filter(function(a){
          // Ensure score exists on fallback items (which don't have it pre-computed)
          if(a.gs==null) a.gs=germainsScore(a.t,a.s);
          return a.gs>0;
        }).sort(function(x,y){
          // Highest relevance first; break ties by recency
          if(y.gs!==x.gs) return y.gs-x.gs;
          return (y.iso||'').localeCompare(x.iso||'');
        })
      : items.filter(function(a){return a.c===cat.id;});

/* ═══════════════════════ HTML report (email + clipboard) ═══════════════════════ */
// Outlook-bulletproof: table-only layout, solid background-colors (no gradients),
// no flex, no inline-block for layout, split `font:` shorthand → Word engine
// renders it correctly. Inline styles only — no <style> blocks (stripped by Gmail).
// Category icons rendered as colored letter badges — identical across every client.
function esc(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
// Category accent colors + icon glyphs — letters render identically everywhere
var CAT_COLORS={
  germains:'#0A4A2A', seed_tech:'#1B6B4A', market:'#2E7D5B',
  breeding:'#4A9E72', regulation:'#5A8A7A', competitors:'#2B5C8A', crops:'#8A6B2E'
};
var CAT_GLYPH={
  germains:'G', seed_tech:'S', market:'M',
  breeding:'B', regulation:'R', competitors:'I', crops:'C'
};
// #2 Smart summary block for the HTML email — Outlook-safe table layout
function buildEmailSummaryBlock(items, SANS, SERIF){
  var s=computeSummary(items);
  if(!s.highPri && !s.topComp.length && !s.topAng.length && !s.topWl.length) return '';
  function chipsHtml(pairs, resolver){
    if(!pairs.length) return '<span style="color:#6E867C;'+SANS+';font-size:12px">(none detected)</span>';
    return '<table role="presentation" cellpadding="0" cellspacing="4" border="0" style="display:inline-table"><tr>'+
      pairs.map(function(p){
        var r=resolver(p.k);
        return '<td style="background-color:'+r.color+';color:#ffffff;padding:3px 8px;'+SANS+';font-size:10px;font-weight:700;letter-spacing:0.4px;line-height:1">'+esc(r.label).toUpperCase()+' \u00B7 '+p.n+'</td>';
      }).join('<td style="width:4px">&nbsp;</td>')+
      '</tr></table>';
  }
  var compRow = chipsHtml(s.topComp, function(k){
    var c=COMPETITORS.find(function(x){return x.label===k;});
    return { label:k, color:c?c.color:'#6E867C' };
  });
  var angRow = chipsHtml(s.topAng, function(k){
    var a=PRODUCT_ANGLES.find(function(x){return x.id===k;});
    return { label:a?a.label:k, color:a?a.color:'#6E867C' };
  });
  var wlRow = s.topWl.length
    ? chipsHtml(s.topWl, function(k){ return { label:k, color:'#D98B30' }; })
    : '';

  function row(lbl, val){
    return '<tr>'+
      '<td style="padding:6px 0 6px 0;width:120px;vertical-align:top;'+SANS+';font-size:11px;font-weight:700;color:#6E867C;letter-spacing:0.3px;text-transform:uppercase">'+esc(lbl)+'</td>'+
      '<td style="padding:6px 0 6px 0;'+SANS+';font-size:13px;color:#112A20;vertical-align:middle">'+val+'</td>'+
    '</tr>';
  }
  return ''+
    '<tr><td style="padding:16px 28px 0 28px;background-color:#F4F8F5">'+
      '<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#FFFFFF;border:1px solid #C6D6CD;border-left:4px solid #1B6B4A">'+
        '<tr><td style="padding:16px 20px 4px 20px">'+
          '<div style="'+SANS+';font-size:11px;font-weight:800;color:#1B6B4A;letter-spacing:0.8px;text-transform:uppercase">\u2728 Why this matters to Germains</div>'+
        '</td></tr>'+
        '<tr><td style="padding:8px 20px 16px 20px">'+
          '<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">'+
            row('High priority', '<b style="color:#0A4A2A;font-size:15px">'+s.highPri+'</b> Germains-relevant articles (score \u2265 3)') +
            row('Competitors',   compRow) +
            row('Product angles', angRow) +
            (wlRow ? row('Watchlist',    wlRow) : '') +
          '</table>'+
        '</td></tr>'+
      '</table>'+
    '</td></tr>';
}

/* ═══════════════════════ Cache (read) ═══════════════════════ */
function loadCached(){
  try{
    var raw=localStorage.getItem(CACHE_KEY);
    if(!raw) return false;
    var obj=JSON.parse(raw);
    if(!obj||!obj.items||!obj.ts) return false;
    if(Date.now()-obj.ts > CACHE_TTL_MS) return false;
    A=obj.items; liveLoaded=true; return true;
  }catch(e){return false;}
}

/* ═══════════════════════ Load articles ═══════════════════════ */
function loadArticles(){
  var usedCache=loadCached();
  renderAll();
  updateBellUI();

  // If cache is fresh, skip the network fetch on this launch — still check notifications
  if(usedCache){ checkAndNotify(); updateBellUI(); return; }

  batchedFetch(FEEDS,4).then(function(fresh){
    fresh=dedupe(fresh.filter(function(a){return a.t;}));
    if(fresh.length>0){
      var titleMap={};
      fresh.forEach(function(a){titleMap[a.t]=true;});
      var merged=fresh.concat(FALLBACK.filter(function(a){return !titleMap[a.t];}));
      A=dedupe(merged);
      // Ensure fallback items have ids + scores (they're authored without them)
      A.forEach(function(a){
        if(a.id==null) a.id=articleId(a.t,a.u);
        if(a.gs==null) a.gs=germainsScore(a.t,a.s);
      });
      liveLoaded=true;
      try{localStorage.setItem(CACHE_KEY,JSON.stringify({ts:Date.now(),items:A}));}catch(e){}
    } else {
      liveLoaded=true;
    }
    render();
    renderStats(getFiltered());
    checkAndNotify();
    updateBellUI();
  });
}

// #10 Call the push worker's /ai-summary endpoint to generate a leadership brief
async function runAiSummary(btn){
  var out=document.getElementById("aiOutput");
  if(!out || !PUSH_WORKER_URL){ showToast("AI summary requires the push worker deployed"); return; }
  btn.disabled=true;
  var origLabel=btn.innerHTML;
  btn.innerHTML=icon('icon-sparkles')+' Analyzing…';
  out.classList.add('show');
  out.textContent='Thinking…';
  try{
    var items=getFiltered();

    var payload={
      context:'Germains Seed Technology — priming, pelleting, film-coat, seed hygiene, and seed analytics are their products.',
      items: items.slice(0,40).map(function(a){
        return { t:a.t, s:(a.s||'').slice(0,220), src:a.src, gs:a.gs||0, comp:a.comp||[], ang:a.ang||[] };
      })
    };
    var res=await fetch(PUSH_WORKER_URL.replace(/\/$/,'')+'/ai-summary',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    if(!res.ok) throw new Error('worker returned '+res.status);
    var data=await res.json();
    out.textContent = data.summary || '(no summary returned)';
  }catch(e){
    out.textContent = 'AI summary failed: '+e.message+'\n\nMake sure the push worker is deployed with an [ai] binding. See cloudflare-worker-push/README.md.';
  }finally{
    btn.disabled=false;
    btn.innerHTML=origLabel;
  }
}

// ─── Shared: write HTML + plain-text to clipboard with Safari-safe Promise wrapping ───
// Safari (desktop + iOS) silently rejects ClipboardItem when Blobs are passed
// directly — it requires Promise-wrapped Blobs. Chrome accepts both. Wrapping
// in Promise.resolve() works everywhere.
async function writeRichClipboard(html, text){
  if(!window.ClipboardItem || !navigator.clipboard || !navigator.clipboard.write){
    await navigator.clipboard.writeText(text);
    return 'text';
  }
  var htmlBlob=new Blob([html],{type:'text/html'});
  var textBlob=new Blob([text],{type:'text/plain'});
  // Safari needs Promise-wrapped blobs — pass them via Promise.resolve()
  var item=new ClipboardItem({
    'text/html':  Promise.resolve(htmlBlob),
    'text/plain': Promise.resolve(textBlob)
  });
  await navigator.clipboard.write([item]);
  return 'html';
}

// ─── Open in Mail: platform-specific flows ───
// Two problems with mailto: (1) it's RFC-6068 text-only, can't carry HTML;
// (2) on iOS, the composer is already filled with text before the user knows
// to paste. Solutions by platform:
//
//   iOS / iPadOS → open the HTML report in a new Safari tab. User taps
//     Share → Mail, and Apple Mail automatically embeds the rendered HTML
//     as the email body. This is the iOS-native "email this page" flow.
//
//   Desktop (macOS, Windows, Linux) → copy HTML+text to the clipboard
//     (rich mail clients render pasted HTML), then launch the mailto:
//     composer with a paste-here hint. User hits ⌘V / Ctrl+V.
document.getElementById("mailtoBtn").addEventListener("click",async function(){
  var regObj=REGIONS.find(function(r){return r.id===region;});
  var subj="SeedPulse Daily Brief — "+regObj.label+" — "+new Date().toLocaleDateString("en-GB");
  var html=buildHtmlReport();
  var text=buildReport();
  var ua=navigator.userAgent||'';
  var isIOS=/iPad|iPhone|iPod/.test(ua) ||
            (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1); // iPadOS

  if(isIOS){
    // Wrap in a page with a prominent "Share to Mail" hint at the top so the
    // user knows what to do with the new tab.
    var hint=''+
      '<div style="position:sticky;top:0;z-index:9999;background-color:#0A4A2A;color:#ffffff;padding:14px 18px;font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:13px;line-height:1.5;text-align:center">'+
        '<b>Tap Share \u2192 Mail</b> below to send this report as a formatted email. '+
        'The formatting (colors, layout, links) will carry through.'+
      '</div>';
    var pageHtml=html.replace(/<body([^>]*)>/,'<body$1>'+hint);
    var blob=new Blob([pageHtml],{type:'text/html'});
    var url=URL.createObjectURL(blob);
    var w=window.open(url,'_blank');
    if(!w){
      // Popup blocked (rare on user-gesture) — fall back to same-tab
      window.location.href=url;
    }
    setTimeout(function(){ try{URL.revokeObjectURL(url);}catch(e){} },120000);
    return;
  }

  // Desktop: clipboard-first flow
  var copied=false;
  try{ await writeRichClipboard(html,text); copied=true; }catch(e){ /* fall through */ }
  var bodyHint = copied
    ? "The fully formatted SeedPulse brief is on your clipboard.\n\nPress Ctrl+V (Windows) or \u2318V (Mac) to paste the HTML version here.\n\n\u2014 plain-text fallback follows \u2014\n\n"
    : "";
  window.location.href="mailto:?subject="+encodeURIComponent(subj)+"&body="+encodeURIComponent(bodyHint+text);
  if(copied) showToast("HTML report copied \u2014 paste (\u2318V / Ctrl+V) into the mail window");
  else showToast("Opened Mail (clipboard copy failed \u2014 pasted as text only)");
});

// ─── Copy Report: write both HTML and plain text to clipboard ───
// Pasting into Gmail/Outlook/Apple Mail/Word picks up the HTML (formatted).
// Pasting into plain-text targets (Slack, Notes) picks up the text fallback.
document.getElementById("copyBtn").addEventListener("click",async function(){
  var btn=this, span=btn.querySelector('span'), useEl=btn.querySelector('use');
  var flash=function(label){
    if(span) span.textContent=label;
    if(useEl) useEl.setAttribute('href','#icon-check');
    setTimeout(function(){
      if(span) span.textContent="Copy Report";
      if(useEl) useEl.setAttribute('href','#icon-copy');
    },1800);
  };
  var html=buildHtmlReport();
  var text=buildReport();
  try{
    var mode=await writeRichClipboard(html,text);
    flash(mode==='html'?"Copied as HTML!":"Copied!");
    if(mode==='html') showToast("Report copied as HTML — paste into mail, Word, or Google Docs");
    else showToast("Report copied as plain text (rich clipboard unavailable)");
  }catch(e){
    try{
      await navigator.clipboard.writeText(text);
      flash("Copied!");
      showToast("Report copied as plain text");
    }catch(e2){
      alert('Copy failed: '+e2.message);
    }
  }
});
