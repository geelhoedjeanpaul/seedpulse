<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F3D2A"/>
      <stop offset="55%" stop-color="#1F6B4A"/>
      <stop offset="100%" stop-color="#3EA06E"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0.2" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#B7F0C8"/>
      <stop offset="100%" stop-color="#5CC98A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.25" r="0.9">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <rect width="192" height="192" rx="42" fill="url(#glow)"/>
  <!-- Sprout: seed (oval) + two leaves -->
  <g transform="translate(96 118)">
    <!-- Seed -->
    <ellipse cx="0" cy="14" rx="14" ry="20" fill="#6B3E1F"/>
    <ellipse cx="-3" cy="8" rx="4" ry="7" fill="rgba(255,255,255,0.18)"/>
    <!-- Stem -->
    <rect x="-2.2" y="-12" width="4.4" height="22" rx="2" fill="#2F8857"/>
    <!-- Left leaf -->
    <path d="M-2 -8 C -28 -20 -32 -48 -4 -40 C 2 -22 -2 -8 -2 -8 Z" fill="url(#leaf)"/>
    <!-- Right leaf -->
    <path d="M2 -14 C 30 -32 40 -62 10 -58 C 0 -38 2 -14 2 -14 Z" fill="url(#leaf)"/>
    <!-- Leaf veins -->
    <path d="M-4 -12 L -18 -32" stroke="rgba(15,61,42,0.35)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M4 -18 L 18 -46" stroke="rgba(15,61,42,0.35)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </g>
  <!-- Pulse line -->
  <path d="M24 150 L 54 150 L 64 134 L 78 166 L 90 142 L 100 150 L 168 150"
        stroke="rgba(255,255,255,0.55)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
