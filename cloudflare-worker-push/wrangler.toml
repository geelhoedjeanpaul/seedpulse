name = "seedpulse-push"
main = "worker.js"
compatibility_date = "2025-01-01"

# ─── Secrets (set via `wrangler secret put ...`) ──────────────────────────
# VAPID_PRIVATE_JWK   — full private JWK JSON string (from generate-vapid.mjs)
# TRIGGER_KEY         — random string to protect the /trigger-test endpoint
# RESEND_API_KEY      — (optional) Resend API key for the daily digest email

# ─── Public vars (plain-text in this file is fine) ────────────────────────
[vars]
VAPID_PUBLIC_KEY  = "BK6aJcHJszAmoujcVAZfCPNlsIvnYyty70b82UZZexdefat7vSYiAleNRgHVP7BnikgwRwCp59sew3i-3xIJGlU"   # base64url, 88 chars
VAPID_SUBJECT     = "mailto:geelhoedjeanpaul@gmail.com"
# Daily digest (feature #5). Leave DIGEST_TO_EMAIL empty to disable.
DIGEST_TO_EMAIL   = ""                                  # comma-separated recipients
DIGEST_FROM_EMAIL = "SeedPulse <onboarding@resend.dev>" # must be verified in Resend for custom domains

# ─── KV namespace for subscriptions + seen-set + latest items ─────────────
# Create it first with:
#   wrangler kv namespace create SUBS
# Then paste the returned id below.
[[kv_namespaces]]
binding = "SUBS"
id      = "39bca28199f6433ea7888293b3241cc3"

# ─── Workers AI binding (feature #10 — "Ask SeedPulse" executive summary) ─
# Free tier includes 10k neurons/day — plenty for interactive summaries and
# one daily digest. Remove this block if you prefer to disable AI features.
[ai]
binding = "AI"

# ─── Cron schedules ───────────────────────────────────────────────────────
# Every 30 min: feed check + push fan-out.
# 07:00 UTC daily: morning digest email (feature #5).
# Free plan allows multiple cron expressions; total budget is 100k req/day.
[triggers]
crons = ["*/30 * * * *", "0 7 * * *"]
